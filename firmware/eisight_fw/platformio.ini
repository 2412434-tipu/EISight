; EISight v4.0c firmware — ESP32 PlatformIO project
;
; Builds the eisight-fw image: AD5933 driver + DS18B20 reader +
; JSONL streamer. No ML, no UI, no cloud (per blueprint v4.0c
; sections I.2 and I.3).

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 921600
upload_speed    = 921600

; The AD5933 library is included as upstream. The upstream
; mjmeli/arduino-ad5933 is targeted at AVR (Arduino Uno); on
; ESP32 some users have reported needing a small patch to
; Wire usage and signed-int parsing. Our own src/ad5933.cpp
; uses Wire directly for the signed-int16 result path
; (per blueprint §I.2.a) and does not rely on the library
; for that critical helper, so the upstream lib is acceptable
; here. If you prefer a known-good ESP32 fork, replace the
; URL below with that fork. Do not change the variable name.
lib_deps =
    milesburton/DallasTemperature@^3.11.0
    paulstoffregen/OneWire@^2.3.7
    https://github.com/mjmeli/arduino-ad5933.git

build_flags =
    -Wall
    -Wextra
    -DEISIGHT_FW_VERSION=\"eisight-fw-0.1.0\"

monitor_filters = default, time
